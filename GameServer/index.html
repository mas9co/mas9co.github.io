<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ɢᴀᴍᴇ sᴇʀᴠᴇʀ sᴜʀᴠᴇʏ</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="page-shell">
		<section class="info-box">
			<div class="top-row">
				<div class="server-summary">
					<div id="serverStatusText">讀取伺服器狀態中...</div>
					<div id="summaryText">請稍候</div>
				</div>

				<div class="title">遊戲伺服器意願調查</div>

				<button id="userButton" class="user-button" type="button">
					<span class="name-text">👤 尚未登入</span>
					<span class="logout-text">登出</span>
				</button>
			</div>

			<div class="divider"></div>

			<div class="subtitle">
				等沒有人想玩的時候，我就會把伺服器關掉，節省電腦資源。
			</div>

			<div class="form-grid">
				<div class="form-group">
					<label for="serverSelect">遊戲伺服器</label>
					<select id="serverSelect"></select>
				</div>

				<div class="form-group">
					<label for="nameInput">你的暱稱</label>
					<input id="nameInput" type="text" maxlength="24" autocomplete="nickname" placeholder="請輸入或修改你的名字">
				</div>

				<button id="mainButton" class="action-btn" type="button">登記/讀取</button>
			</div>

			<div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
		</section>

		<section id="playersSection" class="info-box players-section">
			<div class="section-heading">
				<div class="section-title">參加玩家</div>
			</div>

			<div class="divider"></div>

			<div id="playerGrid" class="player-grid"></div>
		</section>

	</div>

	<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-auth-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/12.1.0/firebase-database-compat.js"></script>
	<script src="firebase-config.js"></script>
	<script src="player.js"></script>
</body>
</html>
